services:

  portainer:
    image: portainer/portainer-ce@sha256:5f9b4bda5582fc72c07d730f86168205f4042d82c9cde011c9146b12496e4625
    container_name: portainer
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data

  mosquitto:
    image: eclipse-mosquitto@sha256:6f8d8a947c506f8a2290ec65cd4bd2bc7cb4d43fb5f6271f861cb013e2ef9797
    container_name: mosquitto
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant@sha256:f73512ba4fe06bb4d57636fe3578d0820cdec46f81e8f837ab59e451662ff3cb
    container_name: homeassistant
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - mosquitto
      - matter_server
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=America/Sao_Paulo

  matter_server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: matter_server
    restart: always
    network_mode: host
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./matter-server:/data
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=America/Sao_Paulo

  appdaemon:
    image: acockburn/appdaemon@sha256:cabcb3a4e739db2572ecb8dc3cee685300ab27274efda83a6d8ce4d3988dc647
    container_name: appdaemon
    restart: always
    network_mode: host
    volumes:
      - ./appdaemon:/conf
    environment:
      - TZ=America/Sao_Paulo

  nodered:
    image: nodered/node-red@sha256:6cb1b27fa5a83deec6a662db62eec8bb32e55ac5412d6b7a653e874ce62055d5
    container_name: nodered
    restart: always
    depends_on:
      - mosquitto
      - homeassistant
    env_file:
      - ./.env
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1880:1880"
    volumes:
      - ./nodered:/data
    environment:
      - TZ=America/Sao_Paulo

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt@sha256:80f7f04f72a99e4c4ef51ef7e98ee736edba6db0ecbb7abc626d0c4b0f1871f1
    container_name: zigbee2mqtt
    restart: always
    depends_on:
      - mosquitto
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:8080:8080"
    volumes:
      - /mnt/data/docker/zigbee2mqtt:/app/data
    environment:
      - TZ=America/Sao_Paulo

  claude-bridge:
    build:
      context: ./claude-bridge
      args:
        DOCKER_GID: "987"
    container_name: claude-bridge
    restart: always
    volumes:
      - /mnt/data/docker:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - claude-bridge-auth:/home/node/.claude
    env_file:
      - ./.env
    environment:
      - WORKDIR=/workspace
      - TZ=America/Sao_Paulo
      - BRIDGE_TOKEN=${CLAUDE_BRIDGE_TOKEN}
      # Auth comes from the CLAUDE_CODE_OAUTH_TOKEN in .env (generated once via
      # `claude setup-token`, tied to the subscription plan), not API-key
      # billing - unset any ANTHROPIC_API_KEY inherited from .env so the CLI
      # doesn't try the API-key path instead.
      - ANTHROPIC_API_KEY=
    ports:
      - "127.0.0.1:8099:8099"

volumes:
  claude-bridge-auth:
