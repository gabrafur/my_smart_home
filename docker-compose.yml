services:

  portainer:
    image: portainer/portainer-ce@sha256:5f9b4bda5582fc72c07d730f86168205f4042d82c9cde011c9146b12496e4625
    container_name: portainer
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data

  mosquitto:
    image: eclipse-mosquitto@sha256:6f8d8a947c506f8a2290ec65cd4bd2bc7cb4d43fb5f6271f861cb013e2ef9797
    container_name: mosquitto
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant@sha256:adb3341e31e03e0048e60d8c1cf952e118a381ae258bb921d3da12a3b27bf0c2
    container_name: homeassistant
    restart: always
    network_mode: host
    depends_on:
      - mosquitto
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo

  appdaemon:
    image: acockburn/appdaemon@sha256:cabcb3a4e739db2572ecb8dc3cee685300ab27274efda83a6d8ce4d3988dc647
    container_name: appdaemon
    restart: always
    network_mode: host
    volumes:
      - ./appdaemon:/conf
    environment:
      - TZ=America/Sao_Paulo

  nodered:
    image: nodered/node-red@sha256:153f411d2993abd9ccd8290017ff2bb531326320b5cd3b200c1a4bb1339eb819
    container_name: nodered
    restart: always
    depends_on:
      - mosquitto
      - homeassistant
    env_file:
      - ./.env
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1880:1880"
    volumes:
      - ./nodered:/data
    environment:
      - TZ=America/Sao_Paulo

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt@sha256:1debff565ab6841417bd9f7ce8ad44f8c5f25a8b02a24ce3fd79e4779a4763a5
    container_name: zigbee2mqtt
    restart: always
    depends_on:
      - mosquitto
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:8080:8080"
    volumes:
      - /mnt/data/docker/zigbee2mqtt:/app/data
    environment:
      - TZ=America/Sao_Paulo
