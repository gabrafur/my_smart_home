services:

  portainer:
    image: portainer/portainer-ce@sha256:3267f1869e0fa87b843c55f7fd848f9e3001367d053505f4cb8c664e4a997996
    container_name: portainer
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data

  mosquitto:
    image: eclipse-mosquitto@sha256:9cfdd46ad59f3e3e5f592f6baf57ab23e1ad00605509d0f5c1e9b179c5314d87
    container_name: mosquitto
    restart: always
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant@sha256:96fa92d83fa8dae987fbbbcf58b1fea1140985ff6a8517b37f7b65c76ef20133
    container_name: homeassistant
    restart: always
    network_mode: host
    depends_on:
      - mosquitto
    volumes:
      - ./homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo

  appdaemon:
    image: acockburn/appdaemon@sha256:cabcb3a4e739db2572ecb8dc3cee685300ab27274efda83a6d8ce4d3988dc647
    container_name: appdaemon
    restart: always
    network_mode: host
    volumes:
      - ./appdaemon:/conf
    environment:
      - TZ=America/Sao_Paulo

  nodered:
    image: nodered/node-red@sha256:330d65c5d9c203df1fc4db8dc7a67cf15c3b3982c85d0f7e0f1aa90dbb8b43f9
    container_name: nodered
    restart: always
    depends_on:
      - mosquitto
      - homeassistant
    env_file:
      - ./.env
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:1880:1880"
    volumes:
      - ./nodered:/data
    environment:
      - TZ=America/Sao_Paulo

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt@sha256:89cf02f379aa743a68494388e3a26fba7b8c9101f8b452038cc07aeff3fc983c
    container_name: zigbee2mqtt
    restart: always
    depends_on:
      - mosquitto
    ports:
      - "${HOST_LAN_IP:-127.0.0.1}:8080:8080"
    volumes:
      - /mnt/data/docker/zigbee2mqtt:/app/data
    environment:
      - TZ=America/Sao_Paulo
